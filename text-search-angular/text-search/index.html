<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Text Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 14px 30px;
    }

    header h1 {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
      display: flex;
      gap: 40px;
    }

    .main {
      flex: 1;
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .search-box {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      background: #fff;
      padding: 8px 12px;
      margin-bottom: 16px;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      font-family: Georgia, serif;
    }

    .search-box button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #999;
    }

    .search-box button:hover {
      color: #333;
    }

    .results-count {
      font-size: 14px;
      margin-bottom: 24px;
      color: #333;
    }

    .results-count span {
      font-weight: bold;
    }

    .article {
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
    }

    .article h3 {
      font-size: 22px;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .article .date {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
      font-family: Arial, sans-serif;
    }

    .article p {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
    }

    mark {
      background: #f5c518;
      color: inherit;
      padding: 0 2px;
    }

    .no-results {
      font-size: 15px;
      color: #666;
      padding: 20px 0;
    }

    /* Sidebar */
    .sidebar-box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .sidebar-box strong {
      font-size: 15px;
    }

    .sidebar-box a {
      color: #1da1f2;
      text-decoration: none;
    }

    .twitter-btn {
      display: inline-block;
      background: #1da1f2;
      color: #fff !important;
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 12px;
      margin-top: 10px;
      font-family: Arial, sans-serif;
    }

    .followers {
      display: inline-block;
      border: 1px solid #ccc;
      padding: 5px 10px;
      font-size: 12px;
      margin-top: 10px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

  <header>
    <h1>bitsofcode</h1>
  </header>

  <div class="container">
    <div class="main">
      <h2>Search</h2>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search articles..." />
        <button onclick="clearSearch()">&#x2715;</button>
      </div>

      <div class="results-count" id="resultsCount"></div>

      <div id="results"></div>
    </div>

    <div class="sidebar">
      <div class="sidebar-box">
        <strong>bitsofcode.</strong> Articles on Frontend Development.
        All articles are written by <a href="#">Ire Aderinokun</a>,
        Frontend Developer and User Interface Designer.
        <br/>
        <a class="twitter-btn" href="#">&#x1F426; Follow @ireaderinokun</a>
        <span class="followers">19.1K followers</span>
      </div>
    </div>
  </div>

  <script>
    // all articles stored in a constant array
    var ARTICLES = [
      {
        title: "Understanding the difference between grid-template and grid-auto",
        date: "Oct 09, 2018",
        content: "With all the new properties related to CSS Grid Layout, one of the distinctions that always confused me was the difference between the grid-template-* and grid-auto-* properties. Specifically the difference between grid-template-rows/columns and grid-auto-rows/columns. Although I knew they were to d..."
      },
      {
        title: "Recreating the GitHub Contribution Graph with CSS Grid Layout",
        date: "Sep 20, 2018",
        content: "The GitHub contribution graph is one of the most recognizable parts of GitHub. It shows a year's worth of contributions in a grid format. In this article I will show how to recreate it using CSS Grid Layout and a little bit of JavaScript."
      },
      {
        title: "How to use CSS Grid for sticky headers and footers",
        date: "Aug 14, 2018",
        content: "CSS Grid is a very powerful layout tool. One common use case is creating sticky headers and footers on a page without using complicated JavaScript. In this post I'll go through how to do exactly that."
      },
      {
        title: "A look at CSS Resets in 2018",
        date: "Jul 22, 2018",
        content: "CSS resets have been around for a long time. They help normalize browser default styles so your site looks consistent across different browsers. Let's take a look at what options are available today."
      },
      {
        title: "How JavaScript works: an overview of the engine, the runtime, and the call stack",
        date: "Jun 15, 2018",
        content: "As JavaScript gets more and more popular, teams are leveraging its support on many levels in their stack. To build great software you need to understand how JavaScript works under the hood — the engine, the runtime, and the call stack."
      },
      {
        title: "Understanding the CSS box model for inline elements",
        date: "May 30, 2018",
        content: "The CSS box model describes the way each HTML element is rendered as a rectangular box. Many people understand how the box model works for block elements, but inline elements are a bit different and less talked about."
      },
      {
        title: "Working with the Fetch API",
        date: "Apr 12, 2018",
        content: "The Fetch API is a modern replacement for XMLHttpRequest. It provides a more powerful and flexible feature set. In this article I'll walk through how to use it to make HTTP requests in JavaScript."
      },
      {
        title: "Introduction to CSS Flexbox",
        date: "Mar 05, 2018",
        content: "CSS Flexbox is a layout module that makes it easy to design flexible responsive layout structures. If you have ever tried to center elements vertically or distribute space between items, flexbox is your friend."
      },
      {
        title: "The Difference Between Explicit and Implicit Grids",
        date: "Feb 18, 2018",
        content: "When working with CSS Grid Layout, there is an important distinction between explicit and implicit grids. An explicit grid is one you define yourself using grid-template-rows and grid-template-columns. An implicit grid is created automatically by the browser."
      },
      {
        title: "How to Create a Responsive Navigation Bar with CSS Grid",
        date: "Jan 10, 2018",
        content: "Navigation bars are one of the most important parts of any website. In this article I'll show you how to create a fully responsive navigation bar using CSS Grid, without any media query hacks."
      },
      {
        title: "Understanding CSS Variables",
        date: "Dec 20, 2017",
        content: "CSS custom properties, also known as CSS variables, are a very powerful feature. They allow you to store values in one place and reuse them throughout your stylesheet. This makes it easier to manage and update your styles."
      },
      {
        title: "A Guide to JavaScript Promises",
        date: "Nov 08, 2017",
        content: "Promises are one of the most important features added to JavaScript in recent years. They make it easier to work with asynchronous code and avoid callback hell. In this guide I'll explain how they work and how to use them."
      }
    ];

    // runs every time the user types something
    document.getElementById('searchInput').addEventListener('input', function() {
      var query = this.value.trim();
      doSearch(query);
    });

    function doSearch(query) {
      var resultsDiv = document.getElementById('results');
      var countDiv = document.getElementById('resultsCount');

      // if search box is empty just clear everything
      if (query == '') {
        resultsDiv.innerHTML = '';
        countDiv.innerHTML = '';
        return;
      }

      // go through all articles and find matches
      var found = [];
      for (var i = 0; i < ARTICLES.length; i++) {
        var article = ARTICLES[i];
        var titleLower = article.title.toLowerCase();
        var contentLower = article.content.toLowerCase();
        var queryLower = query.toLowerCase();

        if (titleLower.includes(queryLower) || contentLower.includes(queryLower)) {
          found.push(article);
        }
      }

      // show how many were found
      if (found.length == 0) {
        countDiv.innerHTML = '';
        resultsDiv.innerHTML = '<p class="no-results">No posts found for "' + query + '".</p>';
        return;
      }

      countDiv.innerHTML = '<span>' + found.length + ' posts</span> were found.';

      // build the HTML for each matched article
      var html = '';
      for (var j = 0; j < found.length; j++) {
        var a = found[j];
        var highlightedTitle = highlight(a.title, query);
        var highlightedContent = highlight(a.content, query);
        html += '<div class="article">';
        html += '<h3>' + highlightedTitle + '</h3>';
        html += '<div class="date">' + a.date + '</div>';
        html += '<p>' + highlightedContent + '</p>';
        html += '</div>';
      }

      resultsDiv.innerHTML = html;
    }

    // wraps matched text in a <mark> tag to highlight it
    function highlight(text, query) {
      var result = '';
      var lowerText = text.toLowerCase();
      var lowerQuery = query.toLowerCase();
      var i = 0;

      while (i < text.length) {
        var matchIndex = lowerText.indexOf(lowerQuery, i);
        if (matchIndex == -1) {
          result += text.slice(i);
          break;
        }
        result += text.slice(i, matchIndex);
        result += '<mark>' + text.slice(matchIndex, matchIndex + query.length) + '</mark>';
        i = matchIndex + query.length;
      }

      return result;
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('results').innerHTML = '';
      document.getElementById('resultsCount').innerHTML = '';
    }
  </script>

</body>
</html>
